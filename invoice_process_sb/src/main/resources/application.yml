# ============================================================
#  Invoice Processing System — Application Configuration
# ============================================================

spring:
  application:
    name: invoice-processing-system

  # ── Database ────────────────────────────────────────────
  datasource:
    #url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:invoice}
    url: jdbc:postgresql://${DB_HOST:invoice.cal400cwmkjj.us-east-1.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:invoice}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  # ── Flyway Migrations ───────────────────────────────────
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis Cache ─────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # ── File Upload ─────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

  # ── Cache ────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000

  # ── Email (SMTP / AWS SES) ──────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ── Server ────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
  error:
    include-message: always
    include-binding-errors: always

# ── App Custom Properties ─────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:invoice-processing-super-secret-key-2024-min-256bits-required}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours

  aws:
    region: ${AWS_REGION:us-east-1}
    s3:
      bucket: ${AWS_S3_BUCKET:u2a-invoice-documents}
      presigned-url-expiry-minutes: 60
    lambda:
      function-name: ${LAMBDA_FUNCTION_NAME:InvoiceProcessorFunction}
    ses:
      from-email: ${AWS_SES_FROM_EMAIL:noreply@u2acts.com}
      reply-to-email: ${AWS_SES_REPLY_TO_EMAIL:support@u2acts.com}

  extraction:
    callback-secret: ${EXTRACTION_CALLBACK_SECRET:invoice-extraction-secret-key-2024}
    callback-base-url: ${APP_BASE_URL:http://localhost:8080}

  notifications:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@u2acts.com}
    enabled: ${NOTIFICATIONS_ENABLED:true}

  rate-limit:
    auth-capacity: 10
    auth-refill-per-minute: 10
    upload-capacity: 30
    upload-refill-per-hour: 30
    general-capacity: 100
    general-refill-per-minute: 100

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger ─────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.invoice: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /usr1/logs/invoice-processing.log
  logback:
    rollingpolicy:
      file-name-pattern: /usr1/logs/invoice-processing-%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 500MB
      clean-history-on-start: false
